eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true



spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: EMPLOYEE
              uri: lb://EMPLOYEE
              predicates:
                - Path=/api/v1/employee/**
              filters:
                - AuthFilter
            - id: ADDRESS
              uri: lb://ADDRESS
              predicates:
                - Path=/api/v1/address/**
              filters:
                - AuthFilter
            - id: AUTH
              uri: lb://AUTH
              predicates:
                - Path=/api/v1/auth/**
